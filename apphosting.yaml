# Firebase App Hosting configuration.
# Keep minInstances at 0 to avoid fixed runtime cost while testing migration.
runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80
  memoryMiB: 512

# Set environment variables and secrets in Firebase Console > App Hosting > Backend > Settings.
# Required runtime secrets:
# - OPENAI_API_KEY
# - ADMIN_SECRET
# - SAFRAPAY_MERCHANT_ID
# - SAFRAPAY_MERCHANT_TOKEN
# - SAFRAPAY_WEBHOOK_SECRET
# Optional runtime vars:
# - SAFRAPAY_ENV
# - SAFRAPAY_GATEWAY_URL
# - VAPID_PUBLIC_KEY
# - VAPID_PRIVATE_KEY
# - VAPID_SUBJECT
# Required build/runtime public vars:
# - NEXT_PUBLIC_FIREBASE_API_KEY
# - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
# - NEXT_PUBLIC_FIREBASE_DATABASE_URL
# - NEXT_PUBLIC_FIREBASE_PROJECT_ID
# - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
# - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
# - NEXT_PUBLIC_FIREBASE_APP_ID
# - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
